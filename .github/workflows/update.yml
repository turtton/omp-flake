name: Auto-update
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Run update script
        run: bash update.sh

      - name: Check for changes
        id: changes
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Extract version
        id: version
        if: steps.changes.outputs.changed == 'true'
        run: echo "version=$(jq -r '.version' hashes.json)" >> $GITHUB_OUTPUT

      - name: Build
        if: steps.changes.outputs.changed == 'true'
        run: nix build .#omp

      - name: Verify version
        if: steps.changes.outputs.changed == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          RESULT=$(./result/bin/omp --version 2>&1)
          echo "Expected: $VERSION"
          echo "Got: $RESULT"
          test "$RESULT" = "omp/$VERSION" || {
            echo "Version mismatch!"
            exit 1
          }

      - name: Create PR
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update omp to ${{ steps.version.outputs.version }}"
          title: "chore: update omp to ${{ steps.version.outputs.version }}"
          body: |
            Auto-detected new version of oh-my-pi.

            - **Version**: ${{ steps.version.outputs.version }}
            - **Source**: [can1357/oh-my-pi/releases](https://github.com/can1357/oh-my-pi/releases)

            Built and verified successfully.
          branch: auto-update
          delete-branch: true
